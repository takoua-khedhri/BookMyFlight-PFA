<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="BookMyFlight - Système de réservation de vols. Trouvez et réservez vos billets d'avion facilement."
    />
    <meta name="keywords" content="vol, réservation, billet d'avion, voyage, BookMyFlight" />
    <meta name="author" content="BookMyFlight Team" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>BookMyFlight - Réservez vos vols en toute simplicité</title>

    <!-- Bootstrap 5 (plus récent et sans problèmes de tracking) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 (gratuit et moderne) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts pour un meilleur design -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Style personnalisé -->
    <style>
      * {
        font-family: 'Poppins', sans-serif;
      }
      
      body {
        margin: 0;
        padding: 0;
        background-color: #f5f7fa;
      }
      
      /* Animation de chargement */
      .loader-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      
      .loader {
        text-align: center;
        color: white;
      }
      
      .loader .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid rgba(255,255,255,0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 1s ease-in-out infinite;
        margin: 0 auto 20px;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Scrollbar personnalisée */
      ::-webkit-scrollbar {
        width: 10px;
      }
      
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #667eea;
        border-radius: 5px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #764ba2;
      }
      
      /* Toast notifications */
      .toast-notification {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9998;
        animation: slideInRight 0.3s ease-out;
      }
      
      @keyframes slideInRight {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Script de chargement -->
    <script>
      // Afficher un loader pendant le chargement de l'application
      (function() {
        const loader = document.createElement('div');
        loader.className = 'loader-container';
        loader.id = 'app-loader';
        loader.innerHTML = `
          <div class="loader">
            <div class="spinner"></div>
            <h3>BookMyFlight</h3>
            <p>Chargement de l'application...</p>
          </div>
        `;
        document.body.appendChild(loader);
        
        // Cacher le loader quand React est prêt
        window.addEventListener('load', function() {
          setTimeout(function() {
            const loaderEl = document.getElementById('app-loader');
            if (loaderEl) {
              loaderEl.style.opacity = '0';
              setTimeout(function() {
                loaderEl.remove();
              }, 500);
            }
          }, 500);
        });
      })();
    </script>
    
    <!-- Bootstrap JS Bundle (inclut Popper, pas de problèmes de tracking) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Axios pour les requêtes HTTP -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </body>
</html>
