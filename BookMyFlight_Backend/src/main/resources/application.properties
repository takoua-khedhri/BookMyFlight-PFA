server.port=8980

# MySQL DataSource
spring.datasource.url=jdbc:mysql://mysql:3306/fbs?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1201
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - Laissez Hibernate gérer les tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# DÉSACTIVER l'initialisation SQL automatique (important !)
spring.sql.init.mode=never

# Logs
logging.level.com.bookmyflight=DEBUG
# Ajoutez ces lignes
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=*
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=false